server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets cacheables a largo plazo (Vite agrega hash en el filename)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy del /api hacia el backend (compose service "backend:8000")
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads servidos también desde el backend
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback — cualquier ruta no resuelta cae a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
